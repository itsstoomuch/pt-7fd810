<title>Project Tracker</title>
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;
       justify-content:center;background:#f9f9f7;
       font-family:system-ui, -apple-system, "Segoe UI", sans-serif;color:#0b0b0b}
  .card{background:#fcfcfb;border:1px solid #e1e0d9;border-radius:12px;
        padding:28px 24px;max-width:330px;width:88%;text-align:center}
  h1{font-size:1.05rem;margin:0 0 14px}
  input[type=password]{width:100%;box-sizing:border-box;padding:10px;
       font-size:1rem;border:1px solid #e1e0d9;border-radius:8px;
       margin-bottom:10px;background:#f9f9f7;color:#0b0b0b}
  button{width:100%;padding:10px;font-size:1rem;border:none;border-radius:8px;
       background:#2a78d6;color:#fff;cursor:pointer}
  label{font-size:.8rem;color:#52514e;display:block;margin:10px 0 0}
  #err{color:#d03b3b;font-size:.82rem;min-height:1.1em;margin:8px 0 0}
</style></head>
<body>
<div class="card">
  <h1>Project Tracker</h1>
  <form id="f">
    <input type="password" id="p" placeholder="Passphrase" autofocus
           autocomplete="current-password">
    <button type="submit">Open</button>
    <label><input type="checkbox" id="r" checked> Remember on this device</label>
    <div id="err"></div>
  </form>
</div>

function b(s){var r=atob(s),a=new Uint8Array(r.length);
  for(var i=0;i<r.length;i++)a[i]=r.charCodeAt(i);return a}
async function dec(pass){
  var raw=b(PAYLOAD),salt=raw.slice(0,16),iv=raw.slice(16,28),ct=raw.slice(28);
  var km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pass),
    "PBKDF2",false,["deriveKey"]);
  var key=await crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:salt,iterations:ITER,hash:"SHA-256"},km,
    {name:"AES-GCM",length:256},false,["decrypt"]);
  var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,ct);
  return new TextDecoder().decode(pt)}
async function go(pass,remember){
  try{var html=await dec(pass);
    if(remember)localStorage.setItem("pt_pass",pass);
    document.open();document.write(html);document.close()}
  catch(e){localStorage.removeItem("pt_pass");
    document.getElementById("err").textContent="Wrong passphrase - try again."}}
document.getElementById("f").addEventListener("submit",function(e){
  e.preventDefault();
  go(document.getElementById("p").value,document.getElementById("r").checked)});
var saved=localStorage.getItem("pt_pass");
if(saved)go(saved,true);
</script>
