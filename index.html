<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>Project Tracker</title>
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;
       justify-content:center;background:#f9f9f7;
       font-family:system-ui, -apple-system, "Segoe UI", sans-serif;color:#0b0b0b}
  .card{background:#fcfcfb;border:1px solid #e1e0d9;border-radius:12px;
        padding:28px 24px;max-width:330px;width:88%;text-align:center}
  h1{font-size:1.05rem;margin:0 0 14px}
  input[type=password]{width:100%;box-sizing:border-box;padding:10px;
       font-size:1rem;border:1px solid #e1e0d9;border-radius:8px;
       margin-bottom:10px;background:#f9f9f7;color:#0b0b0b}
  button{width:100%;padding:10px;font-size:1rem;border:none;border-radius:8px;
       background:#2a78d6;color:#fff;cursor:pointer}
  label{font-size:.8rem;color:#52514e;display:block;margin:10px 0 0}
  #err{color:#d03b3b;font-size:.82rem;min-height:1.1em;margin:8px 0 0}
</style></head>
<body>
<div class="card">
  <h1>Project Tracker</h1>
  <form id="f">
    <input type="password" id="p" placeholder="Passphrase" autofocus
           autocomplete="current-password">
    <button type="submit">Open</button>
    <label><input type="checkbox" id="r" checked> Remember on this device</label>
    <div id="err"></div>
  </form>
</div>
